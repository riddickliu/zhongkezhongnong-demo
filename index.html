<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>助农农产品集散产销系统 · Demo</title>
<style>
:root{--green-dark:#1a5f2a;--green:#389e0d;--green-light:#52c41a;--amber:#d48806;--blue:#0958d9;--red:#cf1322;--bg:#f0f7ec;--card:#fff;--text:#1a1a1a;--muted:#666;--border:#d9d9d9;--shadow:0 4px 16px rgba(0,0,0,.1);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:block}
.login-screen{min-height:100vh;background:linear-gradient(135deg,#0d3a16 0%,#1a5f2a 40%,#389e0d 70%,#73d13d 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px 44px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:8px}
.login-logo .icon{font-size:52px;display:block;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;color:#1a5f2a;text-align:center}
.login-subtitle{text-align:center;color:var(--muted);font-size:13px;margin:6px 0 28px}
.demo-label{font-size:13px;color:var(--muted);margin-bottom:10px;text-align:center}
.role-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:24px 0}
.role-card{padding:20px 16px;border-radius:var(--radius);border:2px solid #e6f4ea;text-align:center;cursor:pointer;transition:all .2s;background:var(--card)}
.role-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
.role-card .emoji{font-size:36px;display:block;margin-bottom:8px}
.role-card h3{font-size:15px;font-weight:600;color:var(--green-dark);margin-bottom:4px}
.role-card p{font-size:12px;color:var(--muted)}
.role-card .badge{display:inline-block;padding:2px 8px;background:var(--green);color:#fff;border-radius:10px;font-size:11px;margin-top:6px}
.app-header{background:#fff;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:100;border-bottom:1px solid #f0f0f0}
.app-header-left{display:flex;align-items:center;gap:12px}
.app-logo{font-size:22px}
.app-role-tag{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.app-nav{display:flex;gap:4px;flex-wrap:wrap}
.app-nav-btn{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:all .15s;font-weight:500;font-family:inherit}
.app-nav-btn:hover{background:#f5f7fa;color:var(--text)}
.app-nav-btn.active{background:#e6f4ea;color:var(--green-dark)}
.app-user{display:flex;align-items:center;gap:10px;font-size:13px}
.app-user .avatar{width:32px;height:32px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.logout-btn{padding:5px 12px;border-radius:6px;border:1px solid #d9d9d9;background:#fff;cursor:pointer;font-size:12px;font-family:inherit}
.app-content{padding:24px;max-width:1400px;margin:0 auto}
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #f0f0f0}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:28px;font-weight:700;color:var(--text)}
.stat-value.green{color:var(--green)}.stat-value.amber{color:var(--amber)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.data-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.data-table th{background:#fafafa;padding:12px 16px;text-align:left;font-size:12px;color:var(--muted);font-weight:600;border-bottom:1px solid #f0f0f0}
.data-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f5f7fa;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fcfdf7}
.tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.tag-green{background:#e6f4ea;color:var(--green)}.tag-amber{background:#fff7e6;color:var(--amber)}.tag-red{background:#fff1f0;color:var(--red)}.tag-blue{background:#e6f0ff;color:var(--blue)}.tag-gray{background:#f5f5f5;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:#2d8a45;transform:translateY(-1px);box-shadow:0 4px 12px rgba(56,158,13,.3)}
.btn-secondary{background:#f5f7fa;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#e8e8e8}
.btn-danger{background:#fff1f0;color:var(--red);border:1px solid #ffa39e}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-lg{padding:11px 24px;font-size:15px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-block{width:100%;justify-content:center}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:13px;font-weight:600;color:var(--text)}
.form-input,.form-select{padding:9px 12px;border:1.5px solid #d9d9d9;border-radius:8px;font-size:13px;outline:none;transition:border-color .15s;background:#fff;font-family:inherit}
.form-input:focus,.form-select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(56,158,13,.1)}
.form-input-number{padding:9px 12px;border:1.5px solid #d9d9d9;border-radius:8px;font-size:13px;width:120px;outline:none;font-family:inherit}
.form-input-number:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(56,158,13,.1)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #f0f0f0;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid #f0f7ec;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.card-body{padding:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media (max-width:900px){.grid-2{grid-template-columns:1fr}}
@media (max-width:768px){
.app-header{position:fixed;top:0;left:0;right:0}
.hamburger{display:flex!important}
.app-nav,.app-role-tag,.logout-btn{display:none!important}
.app-content{padding:16px;padding-top:72px}
.page-title{font-size:18px;margin-bottom:16px}
.stats-grid{grid-template-columns:1fr 1fr!important;gap:10px}
.stat-card{padding:14px}
.stat-value{font-size:22px}
.card-body{overflow-x:auto}
.data-table{font-size:11px}
.data-table th,.data-table td{padding:8px 10px;white-space:nowrap}
.login-card{padding:24px 16px}
}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;font-size:16px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f5f7fa;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.modal-close:hover{background:#e8e8e8}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;gap:10px;justify-content:flex-end}
.timeline{padding:10px 0}
.timeline-item{display:flex;gap:14px;margin-bottom:18px;position:relative}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;position:relative;z-index:1}
.timeline-item:last-child .timeline-dot{background:#d9d9d9}
.timeline-dot::after{content:'';position:absolute;left:4px;top:14px;bottom:-18px;width:2px;background:#e8e8e8}
.timeline-item:last-child .timeline-dot::after{display:none}
.timeline-content{flex:1}
.timeline-title{font-size:13px;font-weight:700;color:var(--text)}
.timeline-detail{font-size:12px;color:var(--muted);margin-top:2px}
.timeline-time{font-size:11px;color:#aaa;margin-top:2px}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:120px;padding:10px 0}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;max-width:48px;border-radius:4px 4px 0 0;transition:height .6s ease;min-height:4px}
.chart-bar-label{font-size:11px;color:var(--muted)}
.chart-bar-value{font-size:11px;font-weight:700;color:var(--text)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.product-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #f0f0f0;transition:all .2s}
.product-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.product-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:40px}
.product-info{padding:14px}
.product-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.product-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.product-price{font-size:20px;font-weight:700;color:var(--red)}
.product-price span{font-size:12px;font-weight:400;color:var(--muted)}
.product-stock{font-size:11px;color:var(--muted);margin-top:4px}
.product-actions{padding:10px 14px;border-top:1px solid #f5f7fa;display:flex;gap:8px;align-items:center}
.product-qty{width:70px;padding:5px 8px;border:1.5px solid #d9d9d9;border-radius:6px;font-size:12px;text-align:center;font-family:inherit}
.hero-banner{background:linear-gradient(135deg,#0d3a16,#1a5f2a,#389e0d);color:#fff;border-radius:var(--radius);padding:28px;margin-bottom:24px}
.hero-banner h2{font-size:24px;font-weight:700;margin-bottom:6px}
.hero-banner p{opacity:.85;font-size:14px}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state .emoji{font-size:48px;display:block;margin-bottom:12px}
.empty-state p{font-size:14px}
.toast{position:fixed;top:70px;right:20px;background:#fff;border-radius:10px;padding:12px 18px;box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:9999;display:none;font-size:13px;font-weight:500;align-items:center;gap:10px;max-width:320px}
.toast.show{display:flex;animation:slideIn .3s ease}
.toast-icon{font-size:20px}
.toast-success{border-left:4px solid var(--green)}.toast-success .toast-icon{color:var(--green)}
.toast-error{border-left:4px solid var(--red)}.toast-error .toast-icon{color:var(--red)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.cart-bar{background:var(--card);border-radius:var(--radius);padding:14px 20px;box-shadow:0 -4px 16px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border:2px solid var(--green)}
.cart-count{font-size:14px;font-weight:700;color:var(--green-dark)}
.pickup-code-box{text-align:center;padding:32px;background:#e6f4ea;border-radius:var(--radius);border:2px dashed var(--green)}
.pickup-code{font-size:36px;font-weight:700;color:var(--green-dark);letter-spacing:6px;font-family:monospace}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.screen.active{animation:fadeIn .3s ease}
.mobile-nav{position:fixed;top:58px;left:0;right:0;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:99;display:none;flex-direction:column;padding:8px}
.mobile-nav.show{display:flex}
.mobile-nav-btn{padding:12px 20px;border:none;background:transparent;text-align:left;font-size:14px;color:var(--text);cursor:pointer;font-family:inherit;border-radius:8px}
.mobile-nav-btn:hover,.mobile-nav-btn.active{background:#e6f4ea;color:var(--green-dark)}
.back-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:24px;border:none;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(56,158,13,.3);z-index:90;font-family:inherit}
.back-btn:hover{background:#2d8a45}
</style>
</head>
<body>

<div id="toast" class="toast">
  <span class="toast-icon"></span>
  <span class="toast-msg"></span>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="icon">&#x1F33E;</span>
        <div class="login-title">助农农产品集散产销系统</div>

        </div>
        <div class="role-card" onclick="loginAs('warehouse')">
          <span class="emoji">&#x1F3ED;</span>
          <h3>仓储物流</h3>
          <p>质检溯源 &middot; 配送调度</p>
        </div>
        <div class="role-card" onclick="loginAs('store')">
          <span class="emoji">&#x1F3EA;</span>
          <h3>城市门店</h3>
          <p>入库核销 &middot; 库存售卖</p>
        </div>
        <div class="role-card" onclick="loginAs('consumer')">
          <span class="emoji">&#x1F6D2;</span>
          <h3>城市用户</h3>
          <p>选购下单 &middot; 溯源查询</p>
        </div>
      </div>
      <div style="text-align:center;font-size:12px;color:#aaa;margin-top:8px">
        推荐演示流程：中转站收货 &rarr; 总仓质检 &rarr; 门店上架 &rarr; 用户下单 &rarr; 核销
      </div>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none">
  <header class="app-header">
    <button class="hamburger" onclick="toggleMobileNav()" style="display:none;width:40px;height:40px;border:none;background:#f5f7fa;border-radius:8px;cursor:pointer;font-size:20px;align-items:center;justify-content:center">☰</button>
    <div class="app-header-left">
      <span class="app-logo">&#x1F33E;</span>
      <strong style="font-size:15px;color:var(--green-dark)">助农产销</strong>
      <span id="header-role" class="app-role-tag"></span>
    </div>
    <nav class="app-nav" id="app-nav"></nav>
    <div class="app-user">
      <div class="avatar" id="header-avatar"></div>
      <span id="header-name"></span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </header>
  <div class="mobile-nav" id="mobile-nav"></div>
  <main class="app-content" id="app-content"></main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title">标题</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

function catIcon(id){var c=STORE.categories.find(function(x){return x.id===id;});return c?c.icon:'';}
function catUnit(id){var c=STORE.categories.find(function(x){return x.id===id;});return c?c.unit:'';}

function storeName(id){var s=STORE.stores.find(function(x){return x.id===id;});return s?s.name:'';}

function tag(status){
  var map={
    pending:['待处理','amber'],received:['已收货','green'],at_station:['在站点','blue'],
    in_transit:['运输中','blue'],in_warehouse:['在总仓','green'],sold:['已售','gray'],
    completed:['已完成','green'],pending_pickup:['待自提','amber'],open:['待处理','red'],
    resolved:['已处理','green'],paid:['已结算','green'],pass:['合格','green'],
    fail:['不合格','red'],A:['A级·优品','green'],B:['B级·普品','amber'],
  };
  var m=map[status]||[status,'gray'];
  return '<span class="tag tag-'+m[1]+'">'+m[0]+'</span>';
}

function showToast(msg,type){
  type=type||'success';
  var t=document.getElementById('toast');
  t.className='toast toast-'+type;
  t.querySelector('.toast-icon').textContent=type==='success'?'&#x2705;':'&#x274C;';
  t.querySelector('.toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

function loginAs(role){
  CURRENT_ROLE=role;
  var r=ROLES[role];
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('app-shell').style.display='block';
  document.getElementById('header-name').textContent=r.name;
  document.getElementById('header-avatar').textContent=r.name[0];
  document.getElementById('header-role').textContent=r.roleTag;
  document.getElementById('header-role').style.background=r.bg;
  document.getElementById('header-role').style.color=r.color;
  renderNav(r.nav);
  renderMobileNav();
  navigateTo(r.nav[0].key);
}

function toggleMobileNav(){
  var nav=document.getElementById('mobile-nav');
  nav.classList.toggle('show');
}
function renderMobileNav(){
  var nav=document.getElementById('mobile-nav');
  var html='';
  ROLES[CURRENT_ROLE].nav.forEach(function(item){
    html+='<button class="mobile-nav-btn'+(item.key===currentPage?' active':'')+'" onclick="navigateTo(\''+item.key+'\')">'+item.label+'</button>';
  });
  html+='<button class="mobile-nav-btn" style="color:var(--red)" onclick="logout()">退出登录</button>';
  nav.innerHTML=html;
}
function navigate(pageKey){
  document.getElementById('mobile-nav').classList.remove('show');
  navigateTo(pageKey);
}

function logout(){
  CURRENT_ROLE=null;
  document.getElementById('app-shell').style.display='none';
  document.getElementById('screen-login').classList.add('active');
}

function renderNav(navItems){
  var nav=document.getElementById('app-nav');
  nav.innerHTML='';
  navItems.forEach(function(item){
    var btn=document.createElement('button');
    btn.className='app-nav-btn';
    btn.textContent=item.label;
    btn.dataset.key=item.key;
    btn.onclick=function(){navigateTo(item.key);};
    nav.appendChild(btn);
  });
}

function navigateTo(key){
  currentPage=key;
  document.querySelectorAll('.app-nav-btn').forEach(function(b){b.classList.remove('active');});
  var active=document.querySelector('.app-nav-btn[data-key="'+key+'"]');
  if(active)active.classList.add('active');
  document.querySelectorAll('.mobile-nav-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelector('.mobile-nav-btn[onclick*="'+key+'"]').classList.add('active');
  var content=document.getElementById('app-content');
  switch(key){
    case'overview':renderAdminOverview();break;
    case'farmerMgmt':renderAdminFarmerMgmt();break;
    case'priceMgmt':renderPriceMgmt();break;
    case'settlement':renderSettlement();break;
    case'afterSales':renderAfterSales();break;
    case'stationOverview':renderStationOverview();break;
    case'farmerReg':renderFarmerReg();break;
    case'receive':renderReceive();break;
    case'ship':renderShip();break;
    case'warehouseOverview':renderWarehouseOverview();break;
    case'inbound':renderInbound();break;
    case'qc':renderQC();break;
    case'delivery':renderDelivery();break;
    case'storeOverview':renderStoreOverview();break;
    case'storeInbound':renderStoreInbound();break;
    case'inventory':renderInventory();break;
    case'orders':renderStoreOrders();break;
    case'shop':renderShop();break;
    case'myOrders':renderMyOrders();break;
    case'trace':renderTraceSearch();break;
  }
}

function submitReceive(){
  var farmerId=parseInt(document.getElementById('recv-farmer').value);
  var categoryId=parseInt(document.getElementById('recv-category').value);
  var quantity=parseFloat(document.getElementById('recv-qty').value);
  var grade=document.getElementById('recv-grade').value;
  if(!farmerId||!categoryId||!quantity){showToast('请填写完整信息','error');return;}
  var cat=STORE.categories.find(function(c){return c.id===categoryId;});
  var batchNo='BT'+String(Date.now()).slice(-8);
  var traceCode='TR'+Math.random().toString(36).slice(2,10).toUpperCase();
  var batchId=genId('batch');
  STORE.batches.push({id:batchId,batchNo:batchNo,stationId:1,categoryId:categoryId,grade:grade,quantity:quantity,remaining:quantity,status:'at_station',traceCode:traceCode,farmerId:farmerId,time:today()+' '+now()});
  STORE.receiveRecords.push({farmerId:farmerId,categoryId:categoryId,quantity:quantity,grade:grade,time:today()+' '+now()});
  var amount=quantity*cat.purchasePrice;
  STORE.settlements.push({id:genId('settlement'),farmerId:farmerId,categoryId:categoryId,quantity:quantity,unit:cat.unit,amount:amount,status:'pending',time:today()+' '+now()});
  showToast('收货成功！批次 '+batchNo+'\n溯源码 '+traceCode+'\n应结算 &#xA5;'+amount.toFixed(2));
  document.getElementById('recv-qty').value='';
  renderReceive();
}

function submitShipment(){
  var shippable=STORE.batches.filter(function(b){return b.stationId===1&&b.status==='at_station'&&b.remaining>0;});
  var selected=shippable.filter(function(b){return document.getElementById('ship-'+b.id).checked;});
  if(selected.length===0){showToast('请至少选择一个批次','error');return;}
  var hasQty=false;
  selected.forEach(function(b){
    var qty=parseFloat(document.getElementById('sqty-'+b.id).value)||0;
    if(qty>0){hasQty=true;b.remaining-=qty;b.status='in_transit';}
  });
  if(!hasQty){showToast('请填写发货数量','error');return;}
  var no='SR'+Math.random().toString(36).slice(2,8).toUpperCase();
  STORE.shipments.push({id:genId('shipment'),no:no,status:'pending',time:today()+' '+now(),items:selected.map(function(b){return Object.assign({},b);})});
  showToast('发货申请已提交！单号 '+no+'\n等待总仓入库');
  renderShip();
}

function warehouseReceive(id){
  var s=STORE.shipments.find(function(ss){return ss.id===id;});
  if(!s)return;
  s.status='received';
  s.receiveTime=today()+' '+now();
  (s.items||[]).forEach(function(item){
    STORE.warehouseInventory.push({id:genId('inv'),batchId:item.id,categoryId:item.categoryId,quantity:item.quantity});
    var b=STORE.batches.find(function(bb){return bb.id===item.id;});
    if(b){b.status='in_warehouse';if(!b.qcStatus)b.qcStatus='pending';}
  });
  showToast('入库成功，商品已入总仓！');
  renderInbound();
}

function qcFail(batchId,invId){
  var b=STORE.batches.find(function(bb){return bb.id===batchId;});

function offlineSell(invId){
  var inv=STORE.storeInventory.find(function(i){return i.id===invId;});
  if(!inv)return;
  var qty=parseFloat(document.getElementById('sell-qty-'+invId).value)||1;
  if(qty>inv.quantity){showToast('库存不足','error');return;}
  inv.quantity-=qty;
  var amt=qty*inv.price;
  showToast('线下售出 &#xA5;'+amt.toFixed(2));
  renderInventory();
}

function verifyOrder(orderId){

function addToCart(invId){
  var inv=STORE.storeInventory.find(function(i){return i.id===invId;});
  if(!inv||inv.quantity<=0){showToast('商品已售罄','error');return;}
  var qty=parseFloat(document.getElementById('cart-qty-'+invId).value)||1;
  if(qty>inv.quantity){showToast('库存不足','error');return;}
  var existing=CART.find(function(c){return c.invId===invId;});
  if(existing){existing.qty+=qty;}else{CART.push({invId:invId,qty:qty,price:inv.price,name:catName(inv.categoryId),unit:catUnit(inv.categoryId)});}
  showToast('已加入购物车：'+catName(inv.categoryId)+' &times; '+qty+catUnit(inv.categoryId));
  renderShop();
}

  body+='<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">中转站收货</div><div class="timeline-detail">桃花镇中转站 &middot; '+tag(b.grade)+'</div><div class="timeline-time">'+(b.time||'') +'</div></div></div>';
  if(b.qcStatus){
    body+='<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">质检完成</div><div class="timeline-detail">'+tag(b.qcStatus)+' · '+(b.qcResult||'') +'</div><div class="timeline-time">'+(b.qcTime||'') +'</div></div></div>';
  }
  if(b.status!=='at_station'){
    body+='<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">总仓入库</div><div class="timeline-detail">县域总仓冷链中心</div><div class="timeline-time">'+today()+'</div></div></div>';
  }
  body+='</div>';
  openModal('&#x1F50D; 农产品溯源',body,'<button class="btn btn-primary btn-block" onclick="closeModal()">关闭</button>');
}
</script>
</body>
</html>
